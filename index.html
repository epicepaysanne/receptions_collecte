<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Arrivages — Épicerie Paysanne</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:          #f2ede4;
      --col-bg:      #e8e1d5;
      --card-bg:     #faf8f4;
      --border:      #d8d0c2;
      --text-dark:   #1a1714;
      --text-mid:    #6b6155;
      --text-soft:   #9c9082;
      --accent:      #b85c2a;
      --warn-bg:     #fef3c7;
      --warn-border: #d97706;
      --warn-txt:    #92400e;
      --divider:     #c8bfb0;
      --transport:   #f0e8d8;
      --transport-t: #6b5b3e;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); min-height: 100vh; }

    header {
      background: var(--text-dark);
      padding: 16px 24px;
      display: flex; align-items: center; justify-content: space-between; gap: 16px;
    }
    .header-left h1 { font-family: 'Playfair Display', serif; font-size: 19px; font-weight: 600; color: #f2ede4; }
    .header-left .subtitle { font-size: 10px; color: #9c9082; margin-top: 2px; letter-spacing: .06em; text-transform: uppercase; }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .status { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #9c9082; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #9c9082; transition: background .3s; flex-shrink: 0; }
    .dot.live    { background: #4ade80; box-shadow: 0 0 6px #4ade8088; }
    .dot.loading { background: #facc15; animation: pulse 1s infinite; }
    .dot.error   { background: #f87171; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .refresh-btn {
      background: none; border: 1px solid #3a3530; color: #9c9082;
      font-family: 'DM Sans', sans-serif; font-size: 11px;
      padding: 5px 12px; border-radius: 4px; cursor: pointer; transition: all .2s;
    }
    .refresh-btn:hover { border-color: #f2ede4; color: #f2ede4; }

    .progress-wrap { height: 2px; background: #2a2520; overflow: hidden; }
    .progress-bar  { height: 100%; background: #2d5a27; width: 100%; transform-origin: left; }

    .meta-bar {
      padding: 9px 24px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .meta-info { font-size: 11px; color: var(--text-soft); }
    .meta-info strong { color: var(--text-mid); font-weight: 500; }
    .interval-select {
      font-family: 'DM Sans', sans-serif; font-size: 11px;
      background: none; border: 1px solid var(--border);
      color: var(--text-mid); padding: 4px 8px; border-radius: 4px; cursor: pointer;
    }

    /* ── LAYOUT GRID UNIFIÉ ── */
    .grid-board {
      display: grid;
      grid-template-columns: repeat(var(--n-cols, 5), 1fr);
      gap: 0;
      height: calc(100vh - 110px);
      overflow: hidden;
    }
    .gcol {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border-right: 1px solid var(--border);
      min-width: 0;
    }
    .gcol:last-child { border-right: none; }
    .gcol.uncertain { background: #f7f0e2; }
    .gcol.uncertain + .gcol.uncertain { border-left: 1px dashed var(--warn-border); }

    .gcol-header {
      padding: 10px 12px 8px;
      border-bottom: 2px solid var(--text-dark);
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 6px;
      flex-shrink: 0;
    }
    .gcol.uncertain .gcol-header { border-bottom-color: var(--warn-border); }

    .gcol-day   { font-family: 'Playfair Display', serif; font-size: 14px; font-weight: 500; color: var(--text-dark); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .gcol.uncertain .gcol-day { color: var(--warn-txt); }
    .gcol-day .warn-icon { color: var(--warn-border); margin-right: 3px; }
    .gcol-count { font-size: 10px; color: var(--text-soft); background: var(--col-bg); padding: 2px 6px; border-radius: 99px; flex-shrink: 0; }
    .gcol.uncertain .gcol-count { background: #f5e6c4; color: var(--warn-txt); }

    .gcol-scroll { overflow-y: auto; overflow-x: hidden; flex: 1; padding: 10px 8px; }

    .card {
      background: var(--card-bg); border: 1px solid var(--border); border-radius: 6px;
      padding: 10px 12px; margin-bottom: 7px; animation: fadeIn .2s ease both;
    }
    .card.uncertain { background: var(--warn-bg); border-color: #fcd34d; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(3px)} to{opacity:1;transform:none} }

    .card-title-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 6px; margin-bottom: 3px; }
    .card-title     { font-size: 12.5px; font-weight: 600; color: var(--text-dark); line-height: 1.3; flex: 1; }
    .card-time      { font-size: 10px; color: var(--text-soft); margin-bottom: 6px; font-variant-numeric: tabular-nums; }

    .transport-info {
      background: var(--transport);
      border-radius: 4px;
      padding: 4px 7px;
      margin-bottom: 7px;
      font-size: 10px;
      color: var(--transport-t);
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .transport-info .icon { font-size: 11px; opacity: .7; }
    .transport-info .name { font-weight: 500; }
    .transport-info .time { color: #9b8a64; font-variant-numeric: tabular-nums; }

    .card-items     { list-style: none; border-top: 1px solid var(--border); padding-top: 7px; display: flex; flex-direction: column; gap: 3px; }
    .card-items li  { font-size: 10.5px; color: var(--text-mid); line-height: 1.4; padding-left: 10px; position: relative; }
    .card-items li::before { content: "–"; position: absolute; left: 0; color: var(--text-soft); }
    .card-items.empty-content li { color: var(--text-soft); font-style: italic; }

    .empty { padding: 32px 16px; text-align: center; color: var(--text-soft); font-size: 12px; }
    .state       { padding: 60px 28px; text-align: center; color: var(--text-soft); font-size: 13px; line-height: 1.7; }
    .state .icon { font-size: 32px; margin-bottom: 12px; }
    .error-msg   { color: var(--accent); font-size: 11px; margin-top: 10px; word-break: break-word; }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>Épicerie Paysanne · Arrivages</h1>
    <div class="subtitle">Planning de collectes semaine</div>
  </div>
  <div class="header-right">
    <div class="status">
      <div class="dot" id="dot"></div>
      <span id="status-text">Chargement…</span>
    </div>
    <button class="refresh-btn" onclick="fetchData()">↻ Actualiser</button>
  </div>
</header>

<div class="progress-wrap"><div class="progress-bar" id="progress"></div></div>

<div class="meta-bar">
  <div class="meta-info">
    Mise à jour : <strong id="last-update">—</strong>
    &nbsp;·&nbsp; <span id="total-count">—</span> collectes
  </div>
  <select class="interval-select" id="interval-select" onchange="changeInterval()">
    <option value="1">Rafraîchir toutes les 1 min</option>
    <option value="2">Rafraîchir toutes les 2 min</option>
    <option value="5" selected>Rafraîchir toutes les 5 min</option>
    <option value="10">Rafraîchir toutes les 10 min</option>
    <option value="30">Rafraîchir toutes les 30 min</option>
  </select>
</div>

<div id="board-container">
  <div class="state"><div class="icon">⏳</div>Chargement des arrivages…</div>
</div>

<script>
  const TEAM_ID = 't6qSSGdCRhAJHHauW';
  const DB_ID   = 'agzi4cu61a2b';
  const API_KEY = '8fa2dedf-d9df-4556-b440-dc45c8a6a382';
  const BASE    = `https://api.ninox.com/v1/teams/${TEAM_ID}/databases/${DB_ID}`;
  const HEADERS = { 'Authorization': `Bearer ${API_KEY}`, 'Content-Type': 'application/json' };

  // Filtres pour la table Collecte (depuis Collecte directement)
  const FILTER_S0 = `Statut=1 and date(Collecte)>=today() and Producteur.'Jour de livraison incertain ?'!=true`;
  const FILTER_L3M = `Statut=1 and yearweek(Collecte)>=yearweek(today()-90) and Producteur.'Jour de livraison incertain ?'=true`;

  // Filtres pour la table Achats (champs préfixés par Collecte.)
  const FILTER_S0_ACHATS = `'Quantité demandée'>0 and Collecte.Statut=1 and date(Collecte.Collecte)>=today() and Collecte.Producteur.'Jour de livraison incertain ?'!=true`;
  const FILTER_L3M_ACHATS = `'Quantité demandée'>0 and Collecte.Statut=1 and yearweek(Collecte.Collecte)>=yearweek(today()-90) and Collecte.Producteur.'Jour de livraison incertain ?'=true`;

  const JOURS = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];

  let intervalMinutes = 5, timer = null;

  // ── REQUÊTE NQL UNIQUE ────────────────────────────────
  async function nql(query) {
    const r = await fetch(`${BASE}/query`, {
      method: 'POST', headers: HEADERS,
      body: JSON.stringify({ query })
    });
    if (!r.ok) throw new Error(`NQL ${r.status}: ${await r.text()}`);
    return r.json();
  }

  // ── ORCHESTRATION ─────────────────────────────────────
  async function fetchData() {
    setStatus('loading', 'Chargement…');
    clearProgress();
    try {
      // Une seule rafale de requêtes NQL — tout en parallèle
      const [collectesS0, collectesL3M, achatsS0, achatsL3M] = await Promise.all([
        // Collectes S0 avec toutes les infos
        nql(`(select Collecte where ${FILTER_S0}).{
          id: number(this),
          ferme: Producteur.'Nom de la ferme',
          collecte: Collecte,
          ramasseTransporteur: Ramasse.Transporteur.Nom,
          ramasseEnlevement: Ramasse.'Enlèvement',
          ramasseLivraison: Ramasse.Livraison
        }`),
        // Collectes L3M Incertain
        nql(`(select Collecte where ${FILTER_L3M}).{
          id: number(this),
          ferme: Producteur.'Nom de la ferme',
          collecte: Collecte,
          ramasseTransporteur: Ramasse.Transporteur.Nom,
          ramasseEnlevement: Ramasse.'Enlèvement',
          ramasseLivraison: Ramasse.Livraison
        }`),
        // Achats S0 (libellés par collecte)
        nql(`(select Achats where ${FILTER_S0_ACHATS}).{
          collecteId: number(Collecte),
          lib: 'libellé facturé'
        }`),
        // Achats L3M
        nql(`(select Achats where ${FILTER_L3M_ACHATS}).{
          collecteId: number(Collecte),
          lib: 'libellé facturé'
        }`)
      ]);

      // Index achats par collecteId (clés en string pour cohérence)
      const achatsByCollecte = new Map();
      [...achatsS0, ...achatsL3M].forEach(a => {
        if (a.collecteId == null) return;
        const k = String(a.collecteId);
        if (!achatsByCollecte.has(k)) achatsByCollecte.set(k, []);
        if (a.lib) achatsByCollecte.get(k).push(a.lib);
      });

      console.log('[DEBUG] Collectes S0:', collectesS0.length, 'IDs:', collectesS0.slice(0,3).map(c => c.id));
      console.log('[DEBUG] Achats indexés:', achatsByCollecte.size, 'clés:', [...achatsByCollecte.keys()].slice(0,3));

      // Composer les données finales
      const buildItem = (c, incertain) => ({
        id:           String(c.id),
        nom:          c.ferme || '?',
        collecte:     c.collecte,
        contenu:      achatsByCollecte.get(String(c.id)) || [],
        ramasse:      (c.ramasseTransporteur || c.ramasseEnlevement || c.ramasseLivraison) ? {
          transporteur: c.ramasseTransporteur || '',
          enlevement:   c.ramasseEnlevement || null,
          livraison:    c.ramasseLivraison || null
        } : null,
        incertain
      });

      const data = [
        ...collectesS0.map(c => buildItem(c, false)),
        ...collectesL3M.map(c => buildItem(c, true))
      ];

      renderBoard(data);

      const now = new Date();
      document.getElementById('last-update').textContent =
        now.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      document.getElementById('total-count').textContent = data.length;
      setStatus('live', 'En direct');
      startProgress();
    } catch(e) {
      setStatus('error', 'Erreur');
      document.getElementById('board-container').innerHTML =
        `<div class="state"><div class="icon">⚠️</div>Erreur de chargement.<div class="error-msg">${e.message}</div></div>`;
      console.error(e);
    }
  }

  // ── RENDER BOARD UNIFIÉ ────────────────────────────────
  function renderBoard(data) {
    const certains   = data.filter(d => !d.incertain);
    const incertains = data.filter(d =>  d.incertain);

    // ── Calculer les jours restants de la semaine (lun→dim) à partir d'aujourd'hui
    const today = new Date(); today.setHours(0,0,0,0);
    const dow = today.getDay(); // 0=dim, 1=lun…
    // Combien de jours jusqu'à dimanche inclus (1=dim → 0 ; 1=lun → 6)
    const daysLeftInWeek = (dow === 0) ? 0 : 7 - dow;
    // Date de fin de semaine (dimanche soir 23:59)
    const endOfWeek = new Date(today);
    endOfWeek.setDate(today.getDate() + daysLeftInWeek);
    endOfWeek.setHours(23,59,59,999);

    // ── Grouper certains par jour
    const dayCols = new Map(); // key (YYYY-MM-DD) → {label, items, isThisWeek}
    // Initialiser une colonne pour chaque jour de la semaine en cours (aujourd'hui inclus)
    for (let i = 0; i <= daysLeftInWeek; i++) {
      const d = new Date(today);
      d.setDate(today.getDate() + i);
      const key = d.toISOString().slice(0,10);
      const label = JOURS[d.getDay()] + ' ' +
        d.getDate().toString().padStart(2,'0') + '/' +
        (d.getMonth()+1).toString().padStart(2,'0');
      dayCols.set(key, { label, items: [], future: false });
    }
    // Ajouter les certains dans leur colonne (créer colonne future si > fin de semaine)
    certains.forEach(item => {
      const d = new Date(item.collecte);
      const key = d.toISOString().slice(0,10);
      if (!dayCols.has(key)) {
        const label = JOURS[d.getDay()] + ' ' +
          d.getDate().toString().padStart(2,'0') + '/' +
          (d.getMonth()+1).toString().padStart(2,'0');
        dayCols.set(key, { label, items: [], future: true });
      }
      dayCols.get(key).items.push(item);
    });

    // ── Séparer les incertains
    const incertSemaine = [];
    const incertAutres = [];
    incertains.forEach(item => {
      const d = new Date(item.collecte);
      if (d >= today && d <= endOfWeek) incertSemaine.push(item);
      else incertAutres.push(item);
    });

    // ── Construire la liste finale des colonnes
    const allCols = [];
    [...dayCols.entries()].sort((a,b) => a[0].localeCompare(b[0])).forEach(([key, col]) => {
      allCols.push({
        type: 'day',
        label: col.label,
        items: col.items.sort((a,b) => new Date(a.collecte) - new Date(b.collecte)),
        uncertain: false
      });
    });
    allCols.push({
      type: 'uncert-week',
      label: '⚠ Incertains · cette semaine',
      items: incertSemaine.sort((a,b) => new Date(a.collecte) - new Date(b.collecte)),
      uncertain: true
    });
    allCols.push({
      type: 'uncert-other',
      label: '⚠ Incertains · autres',
      items: incertAutres.sort((a,b) => new Date(b.collecte) - new Date(a.collecte)),
      uncertain: true
    });

    // ── RENDER
    const container = document.getElementById('board-container');
    container.innerHTML = '';

    const grid = document.createElement('div');
    grid.className = 'grid-board';
    grid.style.setProperty('--n-cols', allCols.length);

    allCols.forEach(col => {
      const c = document.createElement('div');
      c.className = 'gcol' + (col.uncertain ? ' uncertain' : '');

      const h = document.createElement('div');
      h.className = 'gcol-header';
      h.innerHTML = `<span class="gcol-day">${col.label}</span><span class="gcol-count">${col.items.length}</span>`;
      c.appendChild(h);

      const scroll = document.createElement('div');
      scroll.className = 'gcol-scroll';

      if (!col.items.length) {
        scroll.innerHTML = '<div class="empty">—</div>';
      } else {
        col.items.forEach((item, i) => scroll.appendChild(makeCard(item, i, col.uncertain)));
      }

      c.appendChild(scroll);
      grid.appendChild(c);
    });

    container.appendChild(grid);
  }

  // ── CARTE ─────────────────────────────────────────────
  function makeCard(item, i, uncertain) {
    const card = document.createElement('div');
    card.className = 'card' + (uncertain ? ' uncertain' : '');
    card.style.animationDelay = (i * 0.04) + 's';

    // Titre = nom de la ferme
    const titleRow = document.createElement('div');
    titleRow.className = 'card-title-row';
    const title = document.createElement('div');
    title.className = 'card-title';
    title.textContent = item.nom;
    titleRow.appendChild(title);
    card.appendChild(titleRow);

    // Date + heure de collecte
    const timeEl = document.createElement('div');
    timeEl.className = 'card-time';
    if (item.collecte) {
      const d = new Date(item.collecte);
      const dayLabel = JOURS[d.getDay()] + ' ' +
        d.getDate().toString().padStart(2,'0') + '/' +
        (d.getMonth()+1).toString().padStart(2,'0');
      const h = d.getHours().toString().padStart(2,'0');
      const m = d.getMinutes().toString().padStart(2,'0');
      timeEl.textContent = uncertain
        ? dayLabel + ' · ' + h + 'h' + (m==='00'?'':m)
        : 'Collecte ' + h + 'h' + (m==='00'?'':m);
    } else {
      timeEl.textContent = '—';
    }
    card.appendChild(timeEl);

    // Sous-titre : transporteur + heures de ramasse et livraison
    if (item.ramasse && (item.ramasse.transporteur || item.ramasse.enlevement || item.ramasse.livraison)) {
      const tr = document.createElement('div');
      tr.className = 'transport-info';
      const icon = document.createElement('span');
      icon.className = 'icon';
      icon.textContent = '🚚';
      tr.appendChild(icon);
      if (item.ramasse.transporteur) {
        const n = document.createElement('span');
        n.className = 'name';
        n.textContent = item.ramasse.transporteur;
        tr.appendChild(n);
      }
      const fmtHeure = iso => {
        if (!iso) return null;
        const d = new Date(iso);
        const h = d.getHours().toString().padStart(2,'0');
        const m = d.getMinutes().toString().padStart(2,'0');
        return h + 'h' + (m === '00' ? '' : m);
      };
      // Détecter si la ramasse a lieu la veille de la collecte
      const dayDiff = (iso1, iso2) => {
        if (!iso1 || !iso2) return 0;
        const d1 = new Date(iso1); d1.setHours(0,0,0,0);
        const d2 = new Date(iso2); d2.setHours(0,0,0,0);
        return Math.round((d2 - d1) / 86400000);
      };
      const hEnl = fmtHeure(item.ramasse.enlevement);
      const hLiv = fmtHeure(item.ramasse.livraison);
      // Préfixe pour ramasse la veille
      const enlVeille = item.ramasse.enlevement && item.collecte
        ? dayDiff(item.ramasse.enlevement, item.collecte) === 1 : false;
      const enlLabel = enlVeille ? 'la veille ' + hEnl : hEnl;

      if (hEnl || hLiv) {
        const t = document.createElement('span');
        t.className = 'time';
        let txt = '· ';
        if (hEnl && hLiv) txt += 'ramasse ' + enlLabel + ' → livr. ' + hLiv;
        else if (hEnl)    txt += 'ramasse ' + enlLabel;
        else              txt += 'livr. ' + hLiv;
        t.textContent = txt;
        tr.appendChild(t);
      }
      card.appendChild(tr);
    }

    // Contenu en bullet points
    const ul = document.createElement('ul');
    ul.className = 'card-items';
    if (item.contenu && item.contenu.length) {
      item.contenu.forEach(it => {
        const li = document.createElement('li');
        li.textContent = it;
        ul.appendChild(li);
      });
    } else {
      ul.classList.add('empty-content');
      const li = document.createElement('li');
      li.textContent = 'aucun produit';
      ul.appendChild(li);
    }
    card.appendChild(ul);

    return card;
  }

  // ── UTILS ─────────────────────────────────────────────
  function setStatus(state, text) {
    document.getElementById('dot').className = 'dot ' + state;
    document.getElementById('status-text').textContent = text;
  }
  function clearProgress() {
    const bar = document.getElementById('progress');
    bar.style.transition = 'none';
    bar.style.transform = 'scaleX(0)';
  }
  function startProgress() {
    const bar = document.getElementById('progress');
    const ms = intervalMinutes * 60 * 1000;
    bar.style.transition = 'none';
    bar.style.transform = 'scaleX(1)';
    requestAnimationFrame(() => requestAnimationFrame(() => {
      bar.style.transition = `transform ${ms}ms linear`;
      bar.style.transform = 'scaleX(0)';
    }));
  }
  function scheduleNext() {
    if (timer) clearInterval(timer);
    timer = setInterval(fetchData, intervalMinutes * 60 * 1000);
  }
  function changeInterval() {
    intervalMinutes = parseInt(document.getElementById('interval-select').value);
    clearProgress(); scheduleNext(); startProgress();
  }

  fetchData();
  scheduleNext();
</script>
</body>
</html>
